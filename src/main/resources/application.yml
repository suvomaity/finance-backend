spring:
  application:
    name: finance-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db
    username: postgres
    password: your_postgres_password   # TODO: replace with your actual password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  sql:
    init:
      mode: always

server:
  port: 8080

app:
  jwt:
    secret: bXlTdXBlclNlY3JldEtleUZvckp3dFRva2VuU2lnbmluZzEyMzQ1Njc4OTA=
    expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
